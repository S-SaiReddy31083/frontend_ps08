<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Politician Dashboard | FSAD-PS08</title>
    <link rel="icon" type="image/png" href="../fa.png?v=2">
    <link rel="shortcut icon" type="image/png" href="../fa.png?v=2">
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        .politician-header {
            border-radius: 0;
            margin-bottom: 0;
        }

        .logout-btn-custom:hover {
            background-color: red !important;
            color: white !important;
            border-color: red !important;
        }

        body {
            padding-bottom: 48px;
        }

        .stats-container {
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 6px;
            margin-bottom: 8px;
        }

        .stat-card {
            padding: 10px 8px;
        }

        .stat-card h3 {
            font-size: 1.1rem;
            margin-bottom: 2px;
        }

        .stat-card p {
            font-size: 0.7rem;
        }

        .chart-container {
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-wrapper {
            margin-bottom: 10px;
        }

        .details-card {
            margin-top: 10px;
        }

        .dashboard-footer {
            text-align: center;
            padding: 14px 16px;
            background: #fff;
            color: #7f8c8d;
            border-top: 1px solid #e0e0e0;
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 900;
        }

        .dashboard-footer p {
            margin: 0;
            font-size: 12px;
        }
    </style>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- Page Header (acts as full-width nav bar) -->
    <div class="page-header politician-header">
        <h1>📊 Politician Dashboard - Analytics</h1>
        <div>
            <button id="refreshBtn" class="btn btn-primary" onclick="refreshAnalytics()" style="margin-right: 10px;">🔄 Refresh Data</button>
            <button onclick="logout()" class="btn btn-back logout-btn-custom" style="color: black; background-color: white; border: 3px solid black;">Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Alert Messages -->
        <div id="alertMessage" class="alert"></div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading analytics data...</p>
        </div>

        <!-- Statistics Cards -->
        <div class="stats-container" id="statsContainer">
            <!-- Stats will be populated dynamically -->
        </div>

        <!-- Charts Section -->
        <div class="chart-container">
            <!-- Pie Chart -->
            <div class="chart-wrapper">
                <h3>📈 Category Distribution (Percentage)</h3>
                <canvas id="pieChart"></canvas>
            </div>

            <!-- Bar Chart -->
            <div class="chart-wrapper">
                <h3>📊 Issues per Category (Count)</h3>
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <!-- Detailed Issues Table -->
        <div class="card details-card">
            <h2>📋 Detailed Issues Breakdown</h2>
            <div class="table-container">
                <table id="issuesTable">
                    <thead>
                        <tr>
                           <th>ID</th>
                           <th>Title</th>
                           <th>Category</th>
                           <th>Votes</th>
                           <th>Description</th>
                           <th>Media</th>
                        </tr>
                    </thead>
                    <tbody id="issuesTableBody">
                        <!-- Issues will be populated here dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="dashboard-footer">
        <p>Politician Panel – Citizen Politician Interaction System</p>
    </footer>

    <!-- JavaScript Files -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        // Check if user is logged in and has POLITICIAN role
        checkRoleAccess('POLITICIAN');
    </script>
    <script src="../js/politician.js"></script>
</body>
</html>
