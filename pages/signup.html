<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="icon" type="image/png" href="../sign.png?v=1">
    <link rel="shortcut icon" type="image/png" href="../sign.png?v=1">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .politician-only {
            display: none;
        }

        .politician-only.is-active {
            display: block;
        }
    </style>
</head>
<body class="signup-page">
    <div class="container auth-container">
        <!-- Alert Messages -->
        <div id="alertMessage" class="alert"></div>

        <!-- Signup Form -->
        <div class="card auth-card">
            <div class="auth-header">
                <h2>Create Your Account</h2>
                <p>Join thousands of citizens making a difference</p>
            </div>

            <div class="role-toggle" role="group" aria-label="Select role">
                <button type="button" class="role-option is-active" data-role="CITIZEN" aria-pressed="true">
                    <span class="role-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <circle cx="12" cy="8" r="4"></circle>
                            <path d="M4 20c0-4 4-6 8-6s8 2 8 6"></path>
                        </svg>
                    </span>
                    Citizen
                </button>
                <button type="button" class="role-option" data-role="POLITICIAN" aria-pressed="false">
                    <span class="role-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M12 3l7 3v5c0 5-3.5 9-7 10-3.5-1-7-5-7-10V6l7-3z"></path>
                        </svg>
                    </span>
                    Politician
                </button>
            </div>
            
            <form id="signupForm">
                <input type="hidden" id="role" name="role" value="CITIZEN">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="name" class="label-with-icon">
                            <span class="label-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <circle cx="12" cy="8" r="4"></circle>
                                    <path d="M4 20c0-4 4-6 8-6s8 2 8 6"></path>
                                </svg>
                            </span>
                            Full Name *
                        </label>
                        <input type="text" id="name" name="name" placeholder="Sai Reddy" required>
                    </div>

                    <div class="form-group">
                        <label for="email" class="label-with-icon">
                            <span class="label-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <rect x="3" y="6" width="18" height="12" rx="2"></rect>
                                    <path d="M3 7l9 6 9-6"></path>
                                </svg>
                            </span>
                            Email Address *
                        </label>
                        <input type="email" id="email" name="email" placeholder="sai@gmail.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone" class="label-with-icon">
                            <span class="label-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <path d="M6 3h4l1 5-3 2c1.5 3 3.5 5 6 6l2-3 5 1v4c0 1-1 2-2 2C10 20 4 14 4 6c0-1 1-2 2-2z"></path>
                                </svg>
                            </span>
                            Phone Number
                        </label>
                        <input type="tel" id="phone" name="phone" placeholder="+91 000-0000">
                    </div>

                    <div class="form-group">
                        <label for="address" class="label-with-icon">
                            <span class="label-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <path d="M12 22s7-6 7-12a7 7 0 1 0-14 0c0 6 7 12 7 12z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                            </span>
                            Address / Area
                        </label>
                        <input type="text" id="address" name="address" placeholder="123 Main St, City">
                    </div>

                    <div class="form-group politician-only" data-role="POLITICIAN">
                        <label for="govId" class="label-with-icon">
                            <span class="label-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                                    <path d="M7 9h6M7 13h10"></path>
                                </svg>
                            </span>
                            Government ID Proof
                        </label>
                        <input type="file" id="govId" name="govId" data-required="true" accept="image/*,application/pdf">
                    </div>

                    <div class="form-group politician-only" data-role="POLITICIAN">
                        <label for="constitution" class="label-with-icon">
                            <span class="label-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <path d="M6 4h9l3 3v13H6z"></path>
                                    <path d="M9 9h6M9 13h6M9 17h4"></path>
                                </svg>
                            </span>
                            Constitution
                        </label>
                        <input type="text" id="constitution" name="constitution" placeholder="Enter your constitution" data-required="true">
                    </div>

                    <div class="form-group">
                        <label for="password" class="label-with-icon">
                            <span class="label-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <rect x="5" y="11" width="14" height="9" rx="2"></rect>
                                    <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
                                </svg>
                            </span>
                            Password *
                        </label>
                        <input type="password" id="password" name="password" placeholder="Create a password" minlength="6" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="label-with-icon">
                            <span class="label-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <path d="M9 12l2 2 4-4"></path>
                                    <rect x="5" y="11" width="14" height="9" rx="2"></rect>
                                    <path d="M8 11V8a4 4 0 0 1 8 0v3"></path>
                                </svg>
                            </span>
                            Confirm Password *
                        </label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" minlength="6" required>
                    </div>
                </div>

                <label class="terms-row">
                    <input type="checkbox" id="terms" required>
                    <span>I agree to the <a href="#" class="inline-link">Terms of Service</a> and <a href="#" class="inline-link">Privacy Policy</a>.</span>
                </label>

                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary">
                        Create Account
                    </button>
                    <a href="../index.html" class="btn btn-back">
                        Back
                    </a>
                </div>
            </form>

            <p class="auth-footer">
                Already have an account? 
                <a href="login.html" class="inline-link">Login</a>
            </p>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const roleButtons = document.querySelectorAll('.role-option');
        const roleInput = document.getElementById('role');
        const signupForm = document.getElementById('signupForm');
        const politicianFields = document.querySelectorAll('.politician-only');

        function updateRoleFields() {
            const isPolitician = roleInput.value === 'POLITICIAN';

            politicianFields.forEach((field) => {
                field.classList.toggle('is-active', isPolitician);
                const inputs = field.querySelectorAll('input, select, textarea');

                inputs.forEach((input) => {
                    const shouldRequire = input.dataset.required === 'true';
                    input.required = isPolitician && shouldRequire;
                    input.disabled = !isPolitician;
                });
            });
        }

        roleButtons.forEach((button) => {
            button.addEventListener('click', () => {
                roleButtons.forEach((btn) => {
                    btn.classList.remove('is-active');
                    btn.setAttribute('aria-pressed', 'false');
                });

                button.classList.add('is-active');
                button.setAttribute('aria-pressed', 'true');
                roleInput.value = button.dataset.role;
                updateRoleFields();
            });
        });

        updateRoleFields();

        signupForm.addEventListener('submit', (event) => {
    event.preventDefault();

    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const termsAccepted = document.getElementById('terms').checked;

    if (!termsAccepted) {
        showAlert('Please accept the terms and privacy policy', 'error');
        return;
    }

    if (password !== confirmPassword) {
        showAlert('Passwords do not match', 'error');
        return;
    }

    handleSignup(); // ✅ REMOVE event
});
    </script>
</body>
</html>
