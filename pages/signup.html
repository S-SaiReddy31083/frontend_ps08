<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body.signup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .signup-page .container {
            width: 100%;
            max-width: 540px;
            padding: 0;
        }

        .signup-page .card {
            margin-bottom: 0;
        }
    </style>
</head>
<body class="signup-page">
    <div class="container">
        <!-- Alert Messages -->
        <div id="alertMessage" class="alert"></div>

        <!-- Signup Form -->
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2>Create Your Account</h2>
            <p style="color: #6c757d; margin-bottom: 25px;">Join our community reporting platform</p>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Enter your full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Create a password (min 6 characters)"
                        minlength="6"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="role">Register As *</label>
                    <select id="role" name="role" required>
                        <option value="">-- Select Role --</option>
                        <option value="CITIZEN">Citizen</option>
                        <option value="POLITICIAN">Politician</option>
                    </select>
                </div>

                <div style="display: flex; gap: 12px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Sign Up
                    </button>
                    <a href="../index.html" class="btn btn-back" style="width: 100%;">
                        Back
                    </a>
                </div>
            </form>

            <p style="text-align: center; margin-top: 20px; color: #6c757d;">
                Already have an account? 
                <a href="login.html" style="color: #4A90E2; text-decoration: none; font-weight: 600;">Login</a>
            </p>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        // Initialize signup form
        document.getElementById('signupForm').addEventListener('submit', handleSignup);
    </script>
</body>
</html>
