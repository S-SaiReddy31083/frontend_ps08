<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login </title>
    <link rel="icon" type="image/png" href="../log.png?v=1">
    <link rel="shortcut icon" type="image/png" href="../log.png?v=1">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body.login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .login-page .container {
            width: 100%;
            max-width: 540px;
            padding: 0;
        }

        .login-page .card {
            margin-bottom: 0;
        }
    </style>
</head>
<body class="login-page">
    <div class="container">
        <!-- Alert Messages -->
        <div id="alertMessage" class="alert"></div>

        <!-- Login Form -->
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h2>Welcome Back!</h2>
            <p style="color: #6c757d; margin-bottom: 25px;">Please login to access your dashboard</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <div style="display: flex; gap: 12px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        Login
                    </button>
                    <a href="../index.html" class="btn btn-back" style="width: 100%;">
                        Back
                    </a>
                </div>
            </form>

            <p style="text-align: center; margin-top: 20px; color: #6c757d;">
                Don't have an account? 
                <a href="signup.html" style="color: #4A90E2; text-decoration: none; font-weight: 600;">Sign Up</a>
            </p>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        // Initialize login form
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
