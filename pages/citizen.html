<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Dashboard | FSAD-PS08</title>
    <link rel="icon" type="image/png" href="../fa.png?v=2">
    <link rel="shortcut icon" type="image/png" href="../fa.png?v=2">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .logout-btn-custom:hover {
            background-color: red !important;
            color: white !important;
            border-color: red !important;
        }

        /* Make the Citizen Dashboard header behave like a full-width nav bar */
        .citizen-header {
            border-radius: 0;
            margin-bottom: 0;
        }

        body {
            padding-bottom: 48px;
        }

        .dashboard-footer {
            text-align: center;
            padding: 14px 16px;
            background: #fff;
            color: #7f8c8d;
            border-top: 1px solid #e0e0e0;
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 900;
        }

        .dashboard-footer p {
            margin: 0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <!-- Page Header (acts as nav bar for citizen dashboard) -->
    <div class="page-header citizen-header">
        <h1>👥 Citizen Dashboard</h1>
        <div>
            <button onclick="logout()" class="btn btn-back logout-btn-custom" style="margin-right: 10px; color: black; background-color: white; border: 3px solid black;">Logout</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="dashboard-footer">
        <p>Citizen Panel – Citizen Politician Interaction System</p>
    </footer>

    <div class="container">
        <!-- Alert Messages -->
        <div id="alertMessage" class="alert"></div>

        <!-- Issue Submission Form + Right Images -->
        <div style="display: flex; gap: 20px; align-items: stretch; margin-bottom: 20px;">
            <!-- Left: Issue Submission Form -->
            <div class="card" style="max-width: 500px; flex: 0 0 500px; border: 2px solid black;">
                <h2>📝 Report a New Issue</h2>
                <form id="issueForm">
                <div class="form-group">
                    <label for="title">Issue Title *</label>
                    <input 
                        type="text" 
                        id="title" 
                        name="title" 
                        placeholder="Enter a brief title for the issue"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea 
                        id="description" 
                        name="description" 
                        placeholder="Describe the issue in detail"
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        <option value="">-- Select Category --</option>
                        <option value="Road">Road</option>
                        <option value="Water">Water</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Sanitation">Sanitation</option>
                        <option value="Public Safety">Public Safety</option>
                        <option value="Health">Health</option>
                        <option value="Education">Education</option>
                        <option value="Parks">Parks</option>
                        <option value="Transport">Transport</option>
                        <option value="Child Safety">Child Safety</option>
                        <option value="Playgrounds">Playgrounds</option>
                        <option value="Accessibility">Accessibility</option>
                        <option value="Air Quality">Air Quality</option>
                        <option value="Noise Pollution">Noise Pollution</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Upload Image:</label>
                    <input type="file" id="image">
                </div>

                <div class="form-group">
                    <label>Upload Video:</label>
                    <input type="file" id="video">
                </div>
                <div class="form-group">
               <div class="form-group">
    <label for="location">Location</label>
    <div style="display:flex; gap:10px;">
        <input 
            type="text" 
            id="location" 
            placeholder="Enter location"
            required
        >
        <button type="button" onclick="getLocation()">📍 Use My Location</button>
    </div>
</div>
</div>
                <button type="submit" class="btn btn-primary">Submit Issue</button>
            </form>
            </div>

            <!-- Right: Images beside the form -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 16px; height: 100%;">
                <img src="1602926-potholes.webp" alt="Citizen issue illustration 1" style="flex: 1; width: 90%; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.15);">
                <img src="citi.png" alt="Citizen issue illustration 2" style="flex: 1; width: 90%; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.15);">
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading issues...</p>
        </div>

        <!-- Issues List -->
        <div class="card">
            <h2>📋 All Community Issues</h2>
            <div class="table-container">
                <table id="issuesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Votes</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="issuesTableBody">
                        <!-- Issues will be populated here dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        // Check if user is logged in and has CITIZEN role
        checkRoleAccess('CITIZEN');
    </script>
    <script src="../js/citizen.js"></script>
</body>
</html>
<!-- citizen update-->
